{% extends "base.html" %}
{% block content %}
<div x-data="settingsPage()" class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">系统配置</h1>

    <div class="space-y-6">
<div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-lg font-semibold mb-4">模型供应商</h2>

            <template x-for="(provider, pidx) in providers" :key="pidx">
                <div class="border rounded-lg p-4 mb-3">
                    <div class="flex justify-between items-center mb-3">
                        <input type="text" x-model="provider.name" @input="repairDefaultModelSelection()" class="font-medium border rounded px-2 py-1 text-sm" placeholder="供应商名称">
                        <div class="flex items-center gap-2">
                            <button x-show="provider.name && provider.selectedModel" @click="setDefaultModel(provider)" class="text-xs px-2 py-1 rounded border" :class="isDefaultModel(provider) ? 'bg-indigo-100 border-indigo-300 text-indigo-700' : 'hover:bg-gray-50'" x-text="isDefaultModel(provider) ? '已设为默认' : '设为全局默认模型'"></button>
                            <button @click="removeProvider(pidx)" class="text-red-500 text-sm hover:text-red-700">删除</button>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <input type="text" x-model="provider.base_url" class="w-full border rounded px-3 py-2 text-sm" placeholder="Base URL">
                        <input type="password" x-model="provider.api_key" class="w-full border rounded px-3 py-2 text-sm" placeholder="API Key" @focus="provider.api_key=''" x-bind:placeholder="provider.api_key ? '••••••••' : 'API Key'">
                        <div class="flex gap-2">
                            <button @click="testProviderConnection(provider)" class="text-sm px-3 py-1.5 border rounded hover:bg-gray-50" x-text="provider.testing ? '测试中...' : '测试连接'"></button>
                        </div>
                        <div x-show="provider.models.length > 0" class="mt-2">
                            <div class="flex flex-wrap gap-1 mb-2">
                                <template x-for="m in provider.models" :key="m.id">
                                    <span class="text-xs bg-gray-100 text-gray-700 rounded-full px-2 py-0.5" x-text="m.name || m.id"></span>
                                </template>
                            </div>
                            <p class="text-xs text-gray-400 mt-1" x-show="provider.models.length > 0">
                                模型列表已持久化保存
                            </p>
                        </div>
                    </div>
                </div>
            </template>

            <div class="flex gap-2">
                <button @click="addProvider" class="text-sm text-indigo-600 hover:text-indigo-800">+ 添加供应商</button>
                <span class="text-gray-300">|</span>
                <div class="relative" x-data="{ open: false }">
                    <button @click="open = !open" class="text-sm text-indigo-600 hover:text-indigo-800">从预设模板添加</button>
                    <div x-show="open" @click.outside="open=false" class="absolute left-0 top-6 bg-white border rounded-lg shadow-lg py-1 z-10">
                        <template x-for="preset in presets" :key="preset.name">
                            <button @click="addPreset(preset); open=false" class="block w-full text-left px-4 py-2 text-sm hover:bg-gray-50" x-text="preset.name"></button>
                        </template>
                    </div>
                </div>
            </div>

            <div class="mt-4 pt-4 border-t border-gray-200">
                <h3 class="text-md font-semibold mb-3">全局默认模型</h3>
                <div class="grid grid-cols-2 gap-3">
                    <select class="border rounded px-3 py-2 text-sm" x-model="defaultModelProvider" @change="onDefaultProviderChanged()">
                        <option value="">选择默认供应商</option>
                        <template x-for="p in providers.filter(p => p.name)" :key="p.name">
                            <option :value="p.name.toLowerCase()" x-text="p.name"></option>
                        </template>
                    </select>
                    <select class="border rounded px-3 py-2 text-sm" x-model="defaultModelName" @change="saveSilent()">
                        <option value="">选择默认模型</option>
                        <template x-for="m in defaultModelsForSelection()" :key="m.id">
                            <option :value="m.id" x-text="m.name || m.id"></option>
                        </template>
                    </select>
                </div>
                <p class="text-xs text-gray-400 mt-1">未指定模型时，Open API 将使用此全局默认模型</p>
            </div>

        </div>

        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-lg font-semibold mb-4">MinIO 存储</h2>
            <div class="space-y-3">
                <input type="text" x-model="minio.endpoint" class="w-full border rounded px-3 py-2 text-sm" placeholder="Endpoint (e.g. play.min.io:9000)">
                <input type="text" x-model="minio.access_key" class="w-full border rounded px-3 py-2 text-sm" placeholder="Access Key">
                <input type="password" x-model="minio.secret_key" class="w-full border rounded px-3 py-2 text-sm" placeholder="Secret Key" @focus="minio.secret_key=''" x-bind:placeholder="minio.secret_key ? '••••••••' : 'Secret Key'">
                <input type="text" x-model="minio.bucket" class="w-full border rounded px-3 py-2 text-sm" placeholder="Bucket Name">
                <button @click="testConnection('minio')" class="text-sm px-3 py-1.5 border rounded hover:bg-gray-50" x-text="minio.testing ? '测试中...' : '测试连接'"></button>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-lg font-semibold mb-4">Halo 发布</h2>
            <div class="space-y-3">
                <input type="url" x-model="halo.site_url" class="w-full border rounded px-3 py-2 text-sm" placeholder="站点地址 (e.g. https://blog.example.com)">
                <input type="password" x-model="halo.api_token" class="w-full border rounded px-3 py-2 text-sm" placeholder="API Token" @focus="halo.api_token=''" x-bind:placeholder="halo.api_token ? '••••••••' : 'API Token'">
                <button @click="testConnection('halo')" class="text-sm px-3 py-1.5 border rounded hover:bg-gray-50" x-text="halo.testing ? '测试中...' : '测试连接'"></button>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-lg font-semibold mb-4">抓取设置</h2>
            <div class="flex gap-4">
                <label class="flex items-center gap-2 text-sm">
                    <input type="radio" x-model="fetchMode" value="http">
                    HTTP快速抓取
                </label>
                <label class="flex items-center gap-2 text-sm">
                    <input type="radio" x-model="fetchMode" value="browser">
                    浏览器渲染（更完整）
                </label>
            </div>
        </div>

<div class="bg-white rounded-lg shadow p-6">
            <div class="flex items-center justify-between mb-4 gap-3">
                <h2 class="text-lg font-semibold">Open API</h2>
                <a href="/open-api/docs" class="text-sm text-indigo-600 hover:text-indigo-800">查看 /open-api/docs</a>
            </div>
            <div class="space-y-3">
                <div class="flex gap-2">
                    <input type="text" x-model="newKeyLabel" class="flex-1 border rounded px-3 py-2 text-sm" placeholder="Key 标签 (可选)">
                    <button @click="generateOpenApiKey" class="text-sm px-3 py-1.5 border rounded hover:bg-gray-50">生成 Key</button>
                </div>
                <div x-show="openApiKeys.length === 0" class="text-sm text-gray-400 py-2">暂无 API Key，请点击"生成 Key"创建</div>
                <template x-for="(keyItem, kidx) in openApiKeys" :key="keyItem.id">
                    <div class="flex items-center gap-2 border rounded p-3">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <input type="text" :value="keyItem.showKey ? keyItem.key : keyItem.key.replace(/./g, '*')" class="text-sm font-mono border rounded px-2 py-1 bg-gray-50 flex-1 min-w-0" readonly>
                                <button @click="keyItem.showKey = !keyItem.showKey" class="text-xs text-gray-500 hover:text-gray-700" x-text="keyItem.showKey ? '隐藏' : '预览'"></button>
                                <button @click="copyKey(keyItem.key)" class="text-xs text-indigo-500 hover:text-indigo-700">复制</button>
                                <button @click="deleteKey(keyItem.id, kidx)" class="text-xs text-red-500 hover:text-red-700">删除</button>
                            </div>
                            <div class="flex items-center gap-3 mt-1">
                                <span x-show="keyItem.label" class="text-xs text-gray-500" x-text="keyItem.label"></span>
                                <span class="text-xs text-gray-400" x-text="keyItem.created_at ? '创建于: ' + new Date(keyItem.created_at).toLocaleString() : ''"></span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <button @click="save" class="w-full bg-indigo-600 text-white rounded-lg py-2.5 hover:bg-indigo-700 font-medium" :disabled="saving">
            <span x-show="!saving">保存所有配置</span>
            <span x-show="saving">保存中...</span>
        </button>

        <div x-show="toast" x-text="toast" :class="toastType === 'error' ? 'bg-red-600' : 'bg-green-600'" class="fixed top-8 left-1/2 -translate-x-1/2 text-white px-5 py-2.5 rounded-lg shadow-lg text-sm z-50"></div>
    </div>
</div>

<script>
function settingsPage() {
    return {
        providers: [],
        minio: { endpoint: '', access_key: '', secret_key: '', bucket: '', testing: false },
        halo: { site_url: '', api_token: '', testing: false },
        fetchMode: 'http',
        openApiKeys: [],
        newKeyLabel: '',
        defaultModelProvider: '',
        defaultModelName: '',
        saving: false,
        toast: '',
        toastType: 'success',

        presets: [
            { name: 'DeepSeek', base_url: 'https://api.deepseek.com/v1', api_key: '' },
            { name: '模力方舟', base_url: 'https://ai.gitee.com/v1', api_key: '' },
            { name: 'MiniMax', base_url: 'https://api.minimax.chat/v1', api_key: '' },
            { name: 'OpenAI', base_url: 'https://api.openai.com/v1', api_key: '' },
        ],

        async init() {
            const resp = await fetch('/api/config');
            const cfg = await resp.json();
            this.providers = cfg.providers.map(p => ({
                name: p.name, api_key: p.api_key, base_url: p.base_url,
                models: p.models || [], selectedModel: (p.models && p.models.length > 0) ? p.models[0].id : '', testing: false,
            }));
            if (cfg.minio) this.minio = { ...this.minio, ...cfg.minio, testing: false };
            if (cfg.halo) this.halo = { ...this.halo, ...cfg.halo, testing: false };
            this.fetchMode = cfg.fetch_mode || 'http';
            this.openApiKeys = (cfg.open_api_keys || []).map(k => ({ ...k, showKey: false }));
            this.defaultModelProvider = cfg.default_model_provider || '';
            this.defaultModelName = cfg.default_model_name || '';
            this.repairDefaultModelSelection();
        },

        addProvider() {
            this.providers.push({ name: '', api_key: '', base_url: '', models: [], selectedModel: '', testing: false });
            this.repairDefaultModelSelection();
        },

        removeProvider(idx) {
            const provider = this.providers[idx];
            if (provider && this.defaultModelProvider === provider.name.toLowerCase()) {
                this.defaultModelProvider = '';
                this.defaultModelName = '';
            }
            this.providers.splice(idx, 1);
            this.repairDefaultModelSelection();
            this.saveSilent();
        },

        addPreset(preset) {
            this.providers.push({ ...preset, models: [], selectedModel: '', testing: false });
            this.repairDefaultModelSelection();
        },

        isDefaultModel(provider) {
            return provider.name && provider.name.toLowerCase() === this.defaultModelProvider
                && provider.selectedModel && provider.selectedModel === this.defaultModelName;
        },

        setDefaultModel(provider) {
            if (!provider.name || !provider.selectedModel) return;
            if (this.isDefaultModel(provider)) {
                this.defaultModelProvider = '';
                this.defaultModelName = '';
            } else {
                this.defaultModelProvider = provider.name.toLowerCase();
                this.defaultModelName = provider.selectedModel;
            }
            this.saveSilent();
        },

        getDefaultProvider() {
            return this.providers.find(p => p.name && p.name.toLowerCase() === this.defaultModelProvider);
        },

        getDefaultProviderModels() {
            const provider = this.getDefaultProvider();
            return provider ? (provider.models || []) : [];
        },

        repairDefaultModelSelection() {
            const provider = this.getDefaultProvider();
            if (!provider) {
                this.defaultModelProvider = '';
                this.defaultModelName = '';
                return;
            }
            if (provider.name.toLowerCase() !== this.defaultModelProvider) {
                this.defaultModelProvider = provider.name.toLowerCase();
            }
            this.syncDefaultModelSelection();
        },

        syncDefaultModelSelection() {
            const models = this.defaultModelsForSelection();
            if (!models.some(model => model.id === this.defaultModelName) && models.length > 0) {
                this.defaultModelName = models[0].id;
            } else if (models.length === 0) {
                this.defaultModelName = '';
            }
        },

        defaultModelsForSelection() {
            const provider = this.providers.find(
                p => p.name && p.name.toLowerCase() === this.defaultModelProvider
            );
            return provider ? (provider.models || []) : [];
        },

        onDefaultProviderChanged() {
            const provider = this.providers.find(
                p => p.name && p.name.toLowerCase() === this.defaultModelProvider
            );
            if (provider && provider.models && provider.models.length > 0) {
                this.defaultModelName = provider.models[0].id;
            } else {
                this.defaultModelName = '';
            }
            this.saveSilent();
        },

        async fetchProviderModels(provider, { showSuccessToast = true } = {}) {
            if (!provider.name) return false;
            await this.saveSilent();
            try {
                const resp = await fetch(`/api/config/models/${provider.name.toLowerCase()}`, { method: 'POST' });
                const data = await resp.json();
                if (resp.ok) {
                    provider.models = data.models || [];
                    if (provider.models.length > 0) provider.selectedModel = provider.models[0].id;
                    if (provider.name.toLowerCase() === this.defaultModelProvider) this.syncDefaultModelSelection();
                    await this.saveSilent();
                    if (showSuccessToast) this.showToast('模型列表获取成功', 'success');
                    return true;
                } else {
                    this.showToast(data.detail || '获取模型列表失败', 'error');
                    return false;
                }
            } catch (e) {
                this.showToast('获取模型列表失败: ' + e.message, 'error');
                return false;
            }
        },

        async testConnection(service) {
            let url;
            if (service === 'minio') {
                this.minio.testing = true;
                url = '/api/config/test/minio';
            } else if (service === 'halo') {
                this.halo.testing = true;
                url = '/api/config/test/halo';
            }
            await this.saveSilent();
            try {
                const resp = await fetch(url, { method: 'POST' });
                const data = await resp.json();
                if (resp.ok) {
                    this.showToast(data.message, 'success');
                } else {
                    this.showToast(data.detail || data.message || '测试失败', 'error');
                }
            } catch (e) {
                this.showToast('测试失败: ' + e.message, 'error');
            }
            if (service === 'minio') this.minio.testing = false;
            if (service === 'halo') this.halo.testing = false;
        },

        async testProviderConnection(provider) {
            if (!provider.name) return;
            provider.testing = true;
            await this.saveSilent();
            try {
                const resp = await fetch(`/api/config/test/provider.${provider.name.toLowerCase()}`, { method: 'POST' });
                const data = await resp.json();
                if (resp.ok) {
                    const modelsFetched = await this.fetchProviderModels(provider, { showSuccessToast: false });
                    if (modelsFetched) {
                        this.showToast(data.message, 'success');
                    }
                } else {
                    this.showToast(data.detail || data.message || '测试失败', 'error');
                }
            } catch (e) {
                this.showToast('测试失败: ' + e.message, 'error');
            }
            provider.testing = false;
        },

        async saveSilent() {
            const payload = {
                providers: this.providers,
                minio: this.minio,
                halo: this.halo,
                fetch_mode: this.fetchMode,
                open_api_key: null,
                default_model_provider: this.defaultModelProvider || null,
                default_model_name: this.defaultModelName || null,
            };
            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
        },

        async save() {
            this.saving = true;
            try {
                const payload = {
                    providers: this.providers,
                    minio: this.minio,
                    halo: this.halo,
                    fetch_mode: this.fetchMode,
                    open_api_key: null,
                    default_model_provider: this.defaultModelProvider || null,
                    default_model_name: this.defaultModelName || null,
                };
                const resp = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (resp.ok) {
                    this.showToast('配置保存成功', 'success');
                } else {
                    const data = await resp.json();
                    this.showToast(data.detail || '保存失败', 'error');
                }
            } catch (e) {
                this.showToast('保存失败: ' + e.message, 'error');
            }
            this.saving = false;
        },

        showToast(msg, type = 'success') {
            this.toast = msg;
            this.toastType = type;
            setTimeout(() => { this.toast = ''; }, 3000);
        },

        async generateOpenApiKey() {
            try {
                const label = this.newKeyLabel || '';
                const resp = await fetch(`/api/config/keys?label=${encodeURIComponent(label)}`, { method: 'POST' });
                if (resp.ok) {
                    const data = await resp.json();
                    this.openApiKeys.push({ ...data, showKey: true });
                    this.newKeyLabel = '';
                    this.showToast('API Key 已生成', 'success');
                } else {
                    const data = await resp.json();
                    this.showToast(data.detail || '生成失败', 'error');
                }
            } catch (e) {
                this.showToast('生成失败: ' + e.message, 'error');
            }
        },

        async deleteKey(keyId, idx) {
            if (!confirm('确认删除此 API Key？')) return;
            try {
                const resp = await fetch(`/api/config/keys/${keyId}`, { method: 'DELETE' });
                if (resp.ok) {
                    this.openApiKeys.splice(idx, 1);
                    this.showToast('API Key 已删除', 'success');
                } else {
                    const data = await resp.json();
                    this.showToast(data.detail || '删除失败', 'error');
                }
            } catch (e) {
                this.showToast('删除失败: ' + e.message, 'error');
            }
        },

        copyKey(key) {
            navigator.clipboard.writeText(key).then(() => {
                this.showToast('已复制到剪贴板', 'success');
            }).catch(() => {
                this.showToast('复制失败', 'error');
            });
        },
    }
}
</script>
{% endblock %}
