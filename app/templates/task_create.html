{% extends "base.html" %}
{% block content %}
<div x-data="taskCreate()" class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">新建任务</h1>

    <div class="bg-white rounded-lg shadow p-6 space-y-5">
        <template x-for="(task, taskIndex) in tasks" :key="task.id">
            <div class="space-y-5 border border-gray-100 rounded-lg p-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">目标 URL</label>
                    <template x-for="(url, urlIndex) in task.urls" :key="urlIndex">
                        <div class="flex gap-2 mb-2">
                            <input type="url" x-model="task.urls[urlIndex]" class="flex-1 border rounded px-3 py-2 text-sm" placeholder="https://...">
                            <button @click="removeUrl(taskIndex, urlIndex)" class="text-red-500 hover:text-red-700 px-2" x-show="task.urls.length > 1">&times;</button>
                        </div>
                    </template>
                    <button @click="addUrl(taskIndex)" class="text-sm text-indigo-600 hover:text-indigo-800">+ 添加更多URL</button>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">AI 重写配置</label>
                    <div class="grid grid-cols-2 gap-3">
                        <select x-model="task.provider" @change="fetchModels(taskIndex)" class="border rounded px-3 py-2 text-sm">
                            <option value="">选择供应商</option>
                            <template x-for="p in providers" :key="p">
                                <option :value="p" x-text="p"></option>
                            </template>
                        </select>
                        <select x-model="task.model" class="border rounded px-3 py-2 text-sm">
                            <option value="">选择模型</option>
                            <template x-for="m in task.models" :key="m.id">
                                <option :value="m.id" x-text="m.name || m.id"></option>
                            </template>
                        </select>
                    </div>
                    <label class="flex items-center gap-2 mt-3 text-sm text-gray-600">
                        <input type="checkbox" x-model="task.keepCitations">
                        保留原文引用
                    </label>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">发布设置</label>
                    <div class="flex items-center gap-4 flex-wrap">
                        <label class="flex items-center gap-2 text-sm">
                            <input type="radio" x-model="task.publishType" value="immediate">
                            立即发布
                        </label>
                        <label class="flex items-center gap-2 text-sm">
                            <input type="radio" x-model="task.publishType" value="scheduled">
                            定时发布
                        </label>
                        <input type="datetime-local" x-model="task.scheduledAt" x-show="task.publishType === 'scheduled'" class="border rounded px-3 py-2 text-sm">
                    </div>
                </div>
            </div>
        </template>

        <button @click="addTask()" type="button" class="mt-3 w-full py-2 border-2 border-dashed border-gray-300 rounded-lg text-sm text-gray-500 hover:border-indigo-400 hover:text-indigo-600 font-medium">
            + 增加新任务
        </button>

        <button @click="submit" class="w-full bg-indigo-600 text-white rounded-lg py-2.5 hover:bg-indigo-700 font-medium" :disabled="submitting">
            <span x-show="!submitting">开始任务</span>
            <span x-show="submitting">创建中...</span>
        </button>
    </div>
</div>

<script>
function createTaskBlock() {
    return {
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        urls: [''],
        provider: '',
        model: '',
        models: [],
        keepCitations: false,
        publishType: 'immediate',
        scheduledAt: '',
    };
}

function taskCreate() {
    return {
        tasks: [createTaskBlock()],
        providers: [],
        submitting: false,

        async init() {
            const resp = await fetch('/api/config');
            const cfg = await resp.json();
            this.providers = cfg.providers.map(p => p.name.toLowerCase());
            if (this.providers.length > 0) {
                this.tasks.forEach(task => {
                    task.provider = this.providers[0];
                });
                await Promise.all(this.tasks.map((_, index) => this.fetchModels(index)));
            }
        },

        addTask() {
            const task = createTaskBlock();
            if (this.providers.length > 0) {
                task.provider = this.providers[0];
                this.tasks.push(task);
                this.fetchModels(this.tasks.length - 1);
                return;
            }
            this.tasks.push(task);
        },

        addUrl(taskIndex) {
            this.tasks[taskIndex].urls.push('');
        },

        removeUrl(taskIndex, urlIndex) {
            this.tasks[taskIndex].urls.splice(urlIndex, 1);
        },

        async fetchModels(taskIndex) {
            const task = this.tasks[taskIndex];
            if (!task || !task.provider) return;

            task.models = [];
            task.model = '';
            try {
                const resp = await fetch(`/api/config/models/${task.provider}`, { method: 'POST' });
                const data = await resp.json();
                task.models = data.models || [];
                if (task.models.length > 0) {
                    task.model = task.models[0].id;
                }
            } catch (e) { console.error(e); }
        },

        async submit() {
            this.submitting = true;
            try {
                const payload = {
                    tasks: this.tasks.map(task => ({
                        urls: task.urls.filter(u => u.trim()),
                        keep_citations: task.keepCitations,
                        publish_type: task.publishType,
                        scheduled_at: task.publishType === 'scheduled' ? task.scheduledAt : null,
                        model_provider: task.provider,
                        model_name: task.model,
                    })),
                };
                const resp = await fetch('/api/tasks/batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (resp.ok) {
                    window.location.href = '/tasks';
                } else {
                    alert('创建失败');
                }
            } catch (e) { alert('创建失败: ' + e.message); }
            this.submitting = false;
        }
    }
}
</script>
{% endblock %}
