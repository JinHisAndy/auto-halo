{% extends "base.html" %}
{% block content %}
<div x-data="taskList()" class="max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-4">
        <h1 class="text-lg font-bold text-gray-800">任务列表</h1>
        <div class="flex items-center gap-3">
            <span class="text-xs text-gray-400" x-text="'共 ' + total + ' 条'"></span>
            <button @click="loadTasks()" class="text-xs text-gray-400 hover:text-indigo-500 transition-colors" title="刷新列表">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            </button>
        </div>
    </div>

    <div class="space-y-2">
        <template x-for="task in tasks" :key="task.id">
            <div class="group bg-white/80 backdrop-blur-sm rounded-xl shadow-sm border border-gray-100/80 hover:shadow-md hover:-translate-y-0.5 transition-all duration-200 overflow-hidden"
                :class="task.status === 'failed' ? 'border-l-2 border-l-red-400' : task.status === 'completed' ? 'border-l-2 border-l-emerald-400' : ''">
                <div class="px-4 py-3">
                    <div class="flex items-start justify-between gap-3">
                        <div class="flex items-center gap-2 min-w-0 flex-1">
                            <span class="text-sm font-medium text-gray-800 truncate" x-text="task.title || '未命名任务'"></span>
                            <span class="shrink-0 px-1.5 py-0.5 rounded text-[11px] font-medium bg-indigo-50 text-indigo-500 border border-indigo-100"
                                x-show="task.trigger_source === 'api'" x-text="'API'"></span>
                            <span class="shrink-0 px-2 py-0.5 rounded-full text-xs font-medium"
                                :class="statusBadgeClass(task.status)" x-text="statusLabel(task.status)"></span>
                        </div>
                        <div class="flex items-center gap-1 shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button x-show="task.has_original" @click="preview(task, 'original')" class="text-xs px-2 py-0.5 rounded-md text-indigo-500 hover:bg-indigo-50 transition-colors">原文</button>
                            <button x-show="task.has_rewritten" @click="preview(task, 'rewritten')" class="text-xs px-2 py-0.5 rounded-md text-indigo-500 hover:bg-indigo-50 transition-colors">重写</button>
                            <button x-show="task.status === 'failed'" @click="retryTask(task.id)" :disabled="task._retrying" class="text-xs px-2 py-0.5 rounded-md text-amber-500 hover:bg-amber-50 transition-colors" x-text="task._retrying ? '重试中' : '重试'"></button>
                            <button x-show="task.status === 'completed' && task.halo_post_id" @click="republishTask(task.id)" :disabled="task._republishing" class="text-xs px-2 py-0.5 rounded-md text-emerald-500 hover:bg-emerald-50 transition-colors" x-text="task._republishing ? '重发中' : '重发'"></button>
                            <button @click="deleteTask(task.id)" class="text-xs px-2 py-0.5 rounded-md text-red-400 hover:bg-red-50 transition-colors">删除</button>
                        </div>
                    </div>

                    <div class="mt-2 flex items-center gap-2">
                        <div class="flex-1 bg-gray-100 rounded-full h-1.5 overflow-hidden">
                            <div class="h-1.5 rounded-full transition-all duration-500"
                                :class="progressBarClass(task.status)"
                                :style="'width: ' + task.progress + '%'">
                            </div>
                        </div>
                        <span class="text-xs text-gray-400 tabular-nums w-8 text-right" x-text="task.progress + '%'"></span>
                    </div>

                    <div class="flex items-center justify-between mt-1.5 min-w-0 gap-2">
                        <div class="flex items-center gap-2 min-w-0 flex-1">
                            <span class="text-xs text-gray-500 truncate" x-text="task.stage_detail"></span>
                            <template x-if="task.generated_tags && task.generated_tags.length">
                                <span class="hidden sm:flex items-center gap-1 flex-wrap">
                                    <template x-for="tag in task.generated_tags" :key="tag.name">
                                        <span x-text="'#' + tag.name" class="text-[11px] text-gray-400 bg-gray-50 px-1.5 py-0.5 rounded"></span>
                                    </template>
                                </span>
                            </template>
                        </div>
                        <span class="text-[11px] text-gray-400 shrink-0 hidden sm:block" x-text="formatTime(task.created_at)"></span>
                    </div>

                    <div class="flex items-center gap-2 mt-1 text-[11px] text-gray-400">
                        <span x-show="task.model_provider" x-text="task.model_provider + ' / ' + task.model_name"></span>
                        <span x-show="task.scheduled_at" class="text-amber-500" x-text="'定时: ' + formatTime(task.scheduled_at)"></span>
                    </div>
                </div>
            </div>
        </template>

        <div x-show="tasks.length === 0" class="text-center py-16">
            <svg class="w-12 h-12 mx-auto text-gray-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
            <p class="text-sm text-gray-400">暂无任务，<a href="/" class="text-indigo-500 hover:text-indigo-600 font-medium">创建第一个</a></p>
        </div>
    </div>

    <div x-show="total > pageSize" class="flex items-center justify-between mt-4 pt-3 border-t border-gray-100">
        <select x-model="pageSize" @change="changePageSize()" class="border border-gray-200 rounded-lg px-2 py-1 text-xs text-gray-600 focus:outline-none focus:border-indigo-300">
            <option value="10">10条/页</option>
            <option value="20">20条/页</option>
            <option value="50">50条/页</option>
        </select>
        <div class="flex items-center gap-2">
            <button @click="goToPage(currentPage - 1)" :disabled="currentPage <= 1"
                class="px-3 py-1 text-xs border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">上一页</button>
            <span class="text-xs text-gray-400 tabular-nums" x-text="currentPage + ' / ' + totalPages"></span>
            <button @click="goToPage(currentPage + 1)" :disabled="currentPage >= totalPages"
                class="px-3 py-1 text-xs border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">下一页</button>
        </div>
    </div>

    <div x-show="showPreview" class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50" @click.self="showPreview=false">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[80vh] flex flex-col mx-4">
            <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
                <div class="flex gap-1 bg-gray-100 rounded-lg p-0.5">
                    <button @click="preview(currentPreviewTask, 'original')"
                        :class="previewTab==='original' ? 'bg-white shadow-sm text-indigo-600' : 'text-gray-500 hover:text-gray-700'"
                        class="px-3 py-1 rounded-md text-xs font-medium transition-all">原文</button>
                    <button @click="preview(currentPreviewTask, 'rewritten')"
                        :class="previewTab==='rewritten' ? 'bg-white shadow-sm text-indigo-600' : 'text-gray-500 hover:text-gray-700'"
                        class="px-3 py-1 rounded-md text-xs font-medium transition-all">重写稿</button>
                </div>
                <button @click="showPreview=false" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="px-4 py-3 overflow-y-auto flex-1 text-sm text-gray-700 leading-relaxed" x-show="previewTab==='original'" x-html="previewContent"></div>
            <div class="px-4 py-3 overflow-y-auto flex-1 text-sm text-gray-700 leading-relaxed prose max-w-none" x-show="previewTab==='rewritten'" x-html="previewContent"></div>
        </div>
    </div>
</div>

<script>
function taskList() {
    return {
        tasks: [],
        showPreview: false,
        previewTab: 'original',
        previewContent: '',
        ws: null,
        currentPreviewTask: null,
        currentPage: 1,
        pageSize: 10,
        total: 0,
        totalPages: 0,
        _updateTimers: {},

        async init() {
            await this.loadTasks();
            this.connectWs();
        },

        async loadTasks() {
            const resp = await fetch(`/api/tasks?page=${this.currentPage}&page_size=${this.pageSize}`);
            const data = await resp.json();
            this.tasks = (data.tasks || []).map(t => ({ ...t, _retrying: false, _republishing: false }));
            this.total = data.total || 0;
            this.totalPages = data.total_pages || 1;
            this.refreshTaskSubscriptions();
        },

        goToPage(page) {
            if (page < 1 || page > this.totalPages) return;
            this.currentPage = page;
            this.loadTasks();
        },

        changePageSize() {
            this.currentPage = 1;
            this.loadTasks();
        },

        connectWs() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            this.ws = new WebSocket(protocol + '//' + location.host + '/ws/tasks');
            this.ws.onopen = () => this.refreshTaskSubscriptions();
            this.ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'task_update') {
                    this.applyUpdate(msg);
                }
            };
            this.ws.onclose = () => {
                setTimeout(() => this.connectWs(), 3000);
            };
        },

        applyUpdate(msg) {
            const idx = this.tasks.findIndex(t => t.id === msg.task_id);
            if (idx < 0) return;

            const task = this.tasks[idx];
            const key = msg.task_id;

            if (this._updateTimers[key]) {
                clearTimeout(this._updateTimers[key]);
            }

            this._updateTimers[key] = setTimeout(() => {
                task.status = msg.status;
                task.progress = msg.progress;
                task.stage_detail = msg.stage_detail || task.stage_detail;

                if (msg.status === 'completed') {
                    task._retrying = false;
                    task._republishing = false;
                }
                if (msg.status === 'failed') {
                    task._retrying = false;
                }

                this._updateTimers[key] = null;
            }, 50);
        },

        refreshTaskSubscriptions() {
            const activeIds = this.tasks.filter(t => !['completed', 'failed'].includes(t.status)).map(t => t.id);
            if (!this.ws || this.ws.readyState !== WebSocket.OPEN) return;
            this.ws.send(JSON.stringify({ type: 'subscribe', task_ids: activeIds }));
        },

        statusLabel(status) {
            const map = { fetching:'抓取中', parsing:'解析中', rewriting:'重写中', publishing:'发布中', scheduled:'已定时', completed:'已完成', failed:'失败' };
            return map[status] || status;
        },

        statusBadgeClass(status) {
            const map = {
                fetching: 'bg-blue-50 text-blue-600 ring-1 ring-blue-200',
                parsing: 'bg-indigo-50 text-indigo-600 ring-1 ring-indigo-200',
                rewriting: 'bg-violet-50 text-violet-600 ring-1 ring-violet-200',
                publishing: 'bg-sky-50 text-sky-600 ring-1 ring-sky-200',
                scheduled: 'bg-amber-50 text-amber-600 ring-1 ring-amber-200',
                completed: 'bg-emerald-50 text-emerald-600 ring-1 ring-emerald-200',
                failed: 'bg-rose-50 text-rose-600 ring-1 ring-rose-200',
            };
            return map[status] || 'bg-gray-50 text-gray-600 ring-1 ring-gray-200';
        },

        progressBarClass(status) {
            if (status === 'failed') return 'bg-gradient-to-r from-rose-400 to-rose-500';
            if (status === 'completed') return 'bg-gradient-to-r from-emerald-400 to-emerald-500';
            if (status === 'scheduled') return 'bg-gradient-to-r from-amber-400 to-amber-500';
            return 'bg-gradient-to-r from-indigo-400 to-purple-500 animate-shimmer';
        },

        formatTime(isoString) {
            if (!isoString) return '';
            const hasTz = /[+\-]\d{2}:\d{2}$|Z$/i.test(isoString);
            const date = hasTz ? new Date(isoString) : new Date(isoString + 'Z');
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
            if (diff < 604800) return Math.floor(diff / 86400) + '天前';
            return date.toLocaleDateString('zh-CN');
        },

        async preview(task, tab) {
            this.currentPreviewTask = task;
            this.previewTab = tab;
            this.showPreview = true;
            try {
                const resp = await fetch(`/api/tasks/${task.id}`);
                const full = await resp.json();
                if (tab === 'original') {
                    this.previewContent = full.original_content || '';
                } else {
                    this.previewContent = this.renderPreview(full.rewritten_content || '');
                }
            } catch {
                this.previewContent = '';
            }
        },

        renderPreview(text) {
            const value = text || '';
            const trimmed = value.trim();
            if (trimmed.startsWith('<') && trimmed.includes('>')) return value;
            return typeof marked !== 'undefined' ? marked.parse(value) : value;
        },

        async deleteTask(taskId) {
            if (!confirm('确认删除此任务？')) return;
            try {
                await fetch(`/api/tasks/${taskId}`, { method: 'DELETE' });
                this.tasks = this.tasks.filter(t => t.id !== taskId);
                this.total = Math.max(0, this.total - 1);
                this.totalPages = Math.max(1, Math.ceil(this.total / this.pageSize));
            } catch (e) {
                alert('删除失败: ' + e.message);
            }
        },

        async retryTask(taskId) {
            const task = this.tasks.find(t => t.id === taskId);
            if (!task || task._retrying) return;
            task.status = 'fetching'; task.progress = 0; task.stage_detail = '重试中...'; task._retrying = true;
            try {
                const response = await fetch(`/api/tasks/${taskId}/retry`, { method: 'POST' });
                if (!response.ok) { task.status = 'failed'; task.stage_detail = '重试失败'; task._retrying = false; return; }
                this.refreshTaskSubscriptions();
            } catch { task.status = 'failed'; task.stage_detail = '重试失败'; task._retrying = false; }
        },

        async republishTask(taskId) {
            const task = this.tasks.find(t => t.id === taskId);
            if (!task || task._republishing) return;
            task.status = 'publishing'; task.progress = 0; task.stage_detail = '重新发布中...'; task._republishing = true;
            try {
                const response = await fetch(`/api/tasks/${taskId}/republish`, { method: 'POST' });
                if (!response.ok) { task.status = 'completed'; task._republishing = false; return; }
                this.refreshTaskSubscriptions();
            } catch { task.status = 'completed'; task._republishing = false; }
        },
    }
}
</script>

<style>
@keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}
.animate-shimmer {
    background-size: 200% 100%;
    animation: shimmer 2s linear infinite;
}
</style>
{% endblock %}
